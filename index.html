<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  deleteDoc,
  doc,
  setDoc,
  getDoc,
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36",
  storageBucket: "neomis-77b36.firebasestorage.app",
  messagingSenderId: "836047126207",
  appId: "1:836047126207:web:df890a577383585698100a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;

window.collection = collection;
window.getDocs = getDocs;
window.addDoc = addDoc;
window.deleteDoc = deleteDoc;
window.doc = doc;

window.load = async function load() {
  const snap = await getDocs(collection(db, "students"));

  let students = [];

  snap.forEach((d) => {
    students.push({ id: d.id, ...d.data() });
  });

  // save firebase data
  localStorage.setItem("students", JSON.stringify(students));

  // ALSO build classStudents automatically (IMPORTANT FIX)
  let grouped = {};

  students.forEach(s => {
    if (!grouped[s.class]) {
      grouped[s.class] = [];
    }
    if (!grouped[s.class].includes(s.name)) {
      grouped[s.class].push(s.name);
    }
  });

  window.classStudents = grouped;
  localStorage.setItem("classStudents", JSON.stringify(grouped));

  // render table (HOD)
  let html = "";

  students.forEach(s => {
    html += `
      <tr>
        <td>${s.name}</td>
        <td>${s.class}</td>
        <td>${s.sdms || "-"}</td>
        <td>${s.term}</td>
        <td>
          <button class="action-btn view-btn" onclick="view('${s.id}')">View</button>
          <button class="action-btn delete-btn" onclick="deleteStudent('${s.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  const list = document.getElementById("list");
  if (list) list.innerHTML = html;
};
  window.toggleDarkMode = function () {

  document.body.classList.toggle("dark-mode");

  const darkBtn = document.querySelector("[onclick='toggleDarkMode()']");

  if (document.body.classList.contains("dark-mode")) {

    localStorage.setItem("theme", "dark");

    if (darkBtn) {
      darkBtn.innerHTML = "☀️ Light Mode";
    }

  } else {

    localStorage.setItem("theme", "light");

    if (darkBtn) {
      darkBtn.innerHTML = "🌙 Dark Mode";
    }

  }

};

// Load saved theme automatically
window.addEventListener("DOMContentLoaded", () => {

  const savedTheme = localStorage.getItem("theme");

  if (savedTheme === "dark") {

    document.body.classList.add("dark-mode");

    const darkBtn = document.querySelector("[onclick='toggleDarkMode()']");

    if (darkBtn) {
      darkBtn.innerHTML = "☀️ Light Mode";
    }

  }

});

window.login = function () {

  try {

    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    const level = document.getElementById("levelSelect")?.value;
    const subject = document.getElementById("subjectSelect")?.value;

    // 🔥 VALIDATION FIX
    if (!user || !pass) {
      alert("Enter username and password");
      return;
    }

    const subjectPasswords = {
      MATHEMATICS: "mat12",
      ENGLISH: "engl12",
      IKINYARWANDA: "kinyar12",
      SCIENCE: "sci12",
      "SOCIAL STUDIES": "social12",
      FRENCH: "french12",
      "P.E": "pe12",
      "C.A": "ca12",

      PHYSICS: "phy12",
      CHEMISTRY: "chem12",
      BIOLOGY: "bio12",
      GEOGRAPHY: "geo12",
      HISTORY: "hist12",
      ECONOMICS: "eco12",
      ENTREPRENEURSHIP: "ent12",
      "COMPUTER SCIENCE": "cs12",
      LITERATURE: "lit12",
      SWAHILI: "swa12"
    };

    // ================= TEACHER LOGIN =================
    if (user === "TEACHER") {

      if (!level) {
        alert("Select Level (Primary or Secondary)");
        return;
      }

      if (!subject) {
        alert("Select subject");
        return;
      }

      const correctPass = subjectPasswords[subject];

      // 🔥 SAFE CHECK
      if (!correctPass || correctPass !== pass) {
        alert("Wrong Subject Password");
        return;
      }

      localStorage.setItem("role", "teacher");
      localStorage.setItem("teacherSubject", subject);
      localStorage.setItem("teacherLevel", level);

      document.getElementById("loginPage").style.display = "none";
      document.getElementById("teacherSystem").style.display = "block";
      document.getElementById("hodSystem").style.display = "none";

      window.filterTeacherSubject?.();

      return;
    }

    // ================= HOD LOGIN =================
    if (user === "hod" && pass === "Camis") {

      localStorage.setItem("role", "hod");

      document.getElementById("loginPage").style.display = "none";
      document.getElementById("teacherSystem").style.display = "none";
      document.getElementById("hodSystem").style.display = "block";

      window.load?.();

      return;
    }

    alert("Wrong Login");

  } catch (err) {
    console.error(err);
    alert("Login error - check console");
  }
};
window.buildTable = function(all, terms, student) {

  let isAnnual = terms.length === 3;

  // LEVEL DETECTION (safe)
  let level =
    student?.level ||
    (student?.class?.startsWith("S") ? "SECONDARY" : "PRIMARY");

  let subjects = (level === "SECONDARY")
    ? [
        "MATHEMATICS","ENGLISH","IKINYARWANDA",
        "PHYSICS","CHEMISTRY","BIOLOGY",
        "GEOGRAPHY","HISTORY",
        "ECONOMICS","ENTREPRENEURSHIP",
        "COMPUTER SCIENCE","LITERATURE",
        "SWAHILI","FRENCH","P.E","C.A"
      ]
    : [
        "MATHEMATICS","ENGLISH","IKINYARWANDA",
        "SCIENCE","SOCIAL STUDIES",
        "FRENCH","P.E","C.A"
      ];

  let html = `<table class="table-report">
    <tr><th>SUBJECT</th>`;

  terms.forEach(t => {
    html += `<th colspan="5">${t}</th>`;
  });

  if (isAnnual) html += `<th colspan="2">ANNUAL AVG</th>`;

  html += `</tr><tr><th></th>`;

  terms.forEach(() => {
    html += `<th>MID/50</th><th>EXAM/50</th><th>TOTAL/100</th><th>AVG %</th><th>REMARK</th>`;
  });

  if (isAnnual) html += `<th>AVG %</th><th>REMARK</th>`;

  html += `</tr>`;

  let grand = {};
  terms.forEach(t => grand[t] = 0);

  subjects.forEach(sub => {

    html += `<tr><td class="subject-col">${sub}</td>`;

    let annualSum = 0;
    let annualCount = 0;

    terms.forEach(term => {

      let record = all.find(x =>
        x.term === term &&
        x.name === student?.name &&
        x.class === student?.class &&
        x.sdms === student?.sdms
      );

      let mid = 0;
      let exam = 0;

      if (record?.marks?.[sub]) {
        mid = Number(record.marks[sub].mid || 0);
        exam = Number(record.marks[sub].exam || 0);
      }

      let total = mid + exam;

      let max = (sub === "P.E" || sub === "C.A") ? 20 : 100;
      let avg = Math.round((total / max) * 100);

      grand[term] += total;

      annualSum += total;
      annualCount++;

      html += `
        <td>${mid}</td>
        <td>${exam}</td>
        <td>${total}</td>
        <td>${avg}%</td>
        <td>${remark(avg)}</td>
      `;
    });

    if (isAnnual) {
      let annAvg = Math.round((annualSum / (annualCount * 100)) * 100);

      html += `
        <td>${annAvg}%</td>
        <td>${remark(annAvg)}</td>
      `;
    }

    html += `</tr>`;
  });

  // TOTAL ROW
  html += `<tr><td><b>TOTAL AVG</b></td>`;

  terms.forEach(term => {
    let avg = Math.round(grand[term] / subjects.length);
    if (avg > 100) avg = 100;

    html += `
      <td colspan="4">${avg}%</td>
      <td>${remark(avg)}</td>
    `;
  });

  if (isAnnual) {
    let annTotal = 0;

    terms.forEach(t => {
      annTotal += Math.round(grand[t] / subjects.length);
    });

    let annAvg = Math.round(annTotal / terms.length);
    if (annAvg > 100) annAvg = 100;

    html += `
      <td>${annAvg}%</td>
      <td>${remark(annAvg)}</td>
    `;
  }

  html += `</tr></table>`;

  return html;
};

window.saveAllStudents = async function saveAllStudents() {

  let cls = document.getElementById("class").value;
  let term = document.getElementById("term").value;
  let teacherSubject = localStorage.getItem("teacherSubject");

  if (!cls) {
    alert("Select Class");
    return;
  }

  let students = window.classStudents?.[cls];

  if (!students || students.length === 0) {
    alert("No students in this class");
    return;
  }

  const limit =
    (teacherSubject === "P.E" || teacherSubject === "C.A")
    ? 10 : 50;

  try {

    // GET OLD DATA
    const snap = await getDocs(collection(db, "students"));

    let existingStudents = [];

    snap.forEach(d => {
      existingStudents.push({
        firebaseId: d.id,
        ...d.data()
      });
    });

    for (let i = 0; i < students.length; i++) {

      let student = students[i];

      let mid =
        Number(document.getElementById(`mid_${i}`).value) || 0;

      let exam =
        Number(document.getElementById(`exam_${i}`).value) || 0;

      if (mid > limit || exam > limit) {
        alert(student + " exceeds limit");
        return;
      }

      // CHECK EXISTING RECORD
      let existing = existingStudents.find(s =>
        s.name === student &&
        s.class === cls &&
        s.term === term
      );

      if (existing) {

        // UPDATE SUBJECT ONLY
        existing.marks = existing.marks || {};

        existing.marks[teacherSubject] = {
          mid,
          exam
        };

        await setDoc(
          doc(db, "students", existing.firebaseId),
          existing
        );

      } else {

        // CREATE NEW STUDENT
        let newData = {

          name: student,
          class: cls,
          term: term,
          sdms: "",

          marks: {
            [teacherSubject]: {
              mid,
              exam
            }
          },

          createdAt: Date.now()
        };

        await addDoc(
          collection(db, "students"),
          newData
        );
      }
    }

    alert("Marks Saved Successfully ✔");

    await load();

  } catch (err) {

    console.error(err);

    alert("Save Error");
  }
};

window.rank = function (students, cls, terms) {

  let filtered = students.filter(s => s.class === cls);

  let map = {};

  filtered.forEach(s => {

    let key = s.sdms || s.name;

    if (!map[key]) {
      map[key] = {
        student: s,
        total: 0
      };
    }

    let marks = s.marks || {};

    Object.keys(marks).forEach(sub => {

      let m = marks[sub] || { mid: 0, exam: 0 };

      // 🔥 FIX: respect terms filter
      if (!terms.includes(s.term)) return;

      map[key].total += (Number(m.mid) + Number(m.exam));
    });

  });

  let arr = Object.values(map);

  // sort descending
  arr.sort((a, b) => b.total - a.total);

  return arr;
};

  function updateClock() {
  const now = new Date();

  // Kigali time (UTC+2)
  const options = {
    timeZone: "Africa/Kigali",
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  };

  const formatter = new Intl.DateTimeFormat("en-US", options);
  const parts = formatter.formatToParts(now);

  let date = "";
  let time = "";

  parts.forEach(p => {
    if (p.type === "weekday" || p.type === "day" || p.type === "month" || p.type === "year") {
      date += p.value + " ";
    }
    if (p.type === "hour" || p.type === "minute" || p.type === "second") {
      time += p.value + " ";
    }
  });

  document.getElementById("clock").innerHTML =
    `🕒 ${time.trim()} <br> 📅 ${date.trim()}`;

}

setInterval(updateClock, 1000);
